name: Solution Engine Quality Gate

on:
  pull_request:
    paths:
      - "scripts/**"
      - "Uran/RxEngine/SolutionEngine/**"
      - "Uran/RxEngine/Core/WaterSolubilityHeuristics.swift"
      - "Uran/SubstancePropertyCatalog.swift"
      - "Uran/URAN_Pharma_Engine/tests/RECIPE_BREAKER_TEST_SET.json"
      - "Uran/URAN_Pharma_Engine/tests/RECIPE_BREAKER_STRICT_SNAPSHOTS.json"
      - "Uran.xcodeproj/**"
      - ".github/workflows/solution-engine-breaker-gate.yml"
  push:
    branches:
      - main
      - master
      - develop
    paths:
      - "scripts/**"
      - "Uran/RxEngine/SolutionEngine/**"
      - "Uran/RxEngine/Core/WaterSolubilityHeuristics.swift"
      - "Uran/SubstancePropertyCatalog.swift"
      - "Uran/URAN_Pharma_Engine/tests/RECIPE_BREAKER_TEST_SET.json"
      - "Uran/URAN_Pharma_Engine/tests/RECIPE_BREAKER_STRICT_SNAPSHOTS.json"
      - "Uran.xcodeproj/**"
      - ".github/workflows/solution-engine-breaker-gate.yml"
  workflow_dispatch:

jobs:
  quality-gate:
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Toolchain info
        run: |
          xcodebuild -version
          swift --version

      - name: Run solution quality gate
        run: |
          chmod +x scripts/run_solution_quality_gate.sh
          chmod +x scripts/run_solution_breaker_gate.sh
          scripts/run_solution_quality_gate.sh --skip-build
