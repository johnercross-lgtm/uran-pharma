name: Solution Engine Quality Gate

permissions:
  contents: read
  statuses: write

on:
  pull_request:
    paths:
      - "scripts/**"
      - "Uran/RxEngine/SolutionEngine/**"
      - "Uran/RxEngine/Core/WaterSolubilityHeuristics.swift"
      - "Uran/SubstancePropertyCatalog.swift"
      - "Uran/URAN_Pharma_Engine/tests/RECIPE_BREAKER_TEST_SET.json"
      - "Uran/URAN_Pharma_Engine/tests/RECIPE_BREAKER_STRICT_SNAPSHOTS.json"
      - "Uran.xcodeproj/**"
      - ".github/workflows/solution-engine-breaker-gate.yml"
  push:
    branches:
      - main
      - master
      - develop
    paths:
      - "scripts/**"
      - "Uran/RxEngine/SolutionEngine/**"
      - "Uran/RxEngine/Core/WaterSolubilityHeuristics.swift"
      - "Uran/SubstancePropertyCatalog.swift"
      - "Uran/URAN_Pharma_Engine/tests/RECIPE_BREAKER_TEST_SET.json"
      - "Uran/URAN_Pharma_Engine/tests/RECIPE_BREAKER_STRICT_SNAPSHOTS.json"
      - "Uran.xcodeproj/**"
      - ".github/workflows/solution-engine-breaker-gate.yml"
  workflow_dispatch:

jobs:
  quality-gate:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Toolchain info
        run: |
          xcodebuild -version
          swift --version

      - name: Run solution quality gate
        run: |
          chmod +x scripts/run_solution_quality_gate.sh
          chmod +x scripts/run_solution_breaker_gate.sh
          scripts/run_solution_quality_gate.sh --skip-build

      - name: Publish required status context
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          JOB_STATUS: ${{ job.status }}
        run: |
          if [[ "$JOB_STATUS" == "success" ]]; then
            state="success"
            desc="quality gate passed"
          else
            state="failure"
            desc="quality gate failed"
          fi

          payload=$(
            cat <<JSON
{"state":"$state","context":"Solution Engine Quality Gate / quality-gate","description":"$desc","target_url":"$RUN_URL"}
JSON
          )

          curl -sS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/statuses/$SHA" \
            -d "$payload"
